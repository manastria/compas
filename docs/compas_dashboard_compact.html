<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compas — Dashboard collectif</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #f4f3ef;
      --bg-card: #ffffff;
      --bg-bar-track: #e8e7e2;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b68;
      --text-tertiary: #9a9a96;
      --border-light: rgba(0, 0, 0, 0.08);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

      --color-red: #E24B4A;
      --color-orange: #EF9F27;
      --color-amber: #BA7517;
      --color-green: #639922;
      --color-teal: #1D9E75;

      --rank-or-bg: #FAEEDA; --rank-or-text: #854F0B; --rank-or-border: #FAC775;
      --rank-argent-bg: #F1EFE8; --rank-argent-text: #5F5E5A; --rank-argent-border: #D3D1C7;
      --rank-bronze-bg: #FAECE7; --rank-bronze-text: #993C1D; --rank-bronze-border: #F5C4B3;
      --rank-alerte-bg: #FCEBEB; --rank-alerte-text: #A32D2D; --rank-alerte-border: #F7C1C1;

      --pres-ok-bg: #E1F5EE; --pres-ok-text: #0F6E56;
      --pres-warn-bg: #FAEEDA; --pres-warn-text: #854F0B;
      --pres-bad-bg: #FCEBEB; --pres-bad-text: #A32D2D;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #1a1a1a;
        --bg-card: #2a2a2a;
        --bg-bar-track: #3a3a3a;
        --text-primary: #e8e8e4;
        --text-secondary: #a0a09c;
        --text-tertiary: #707070;
        --border-light: rgba(255, 255, 255, 0.08);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
      padding: 1rem 1.25rem;
      line-height: 1.4;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .header-title { font-size: 18px; font-weight: 500; }
    .header-seance { font-size: 13px; color: var(--text-secondary); }
    .header-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    @media (min-width: 1100px) {
      .grid { grid-template-columns: repeat(5, 1fr); }
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 10px 12px 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 6px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .card-name--anon { font-style: italic; opacity: 0.7; }

    .trend { font-size: 12px; flex-shrink: 0; }
    .trend--up { color: var(--color-teal); }
    .trend--down { color: var(--color-red); }
    .trend--stable { color: var(--text-tertiary); }

    .card-body {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
      display: inline-block;
      width: fit-content;
    }

    .pres-line {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pres-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-line {
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      width: 72px;
      height: 70px;
      padding-top: 2px;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
    }

    .bar-label {
      font-size: 8px;
      color: var(--text-tertiary);
      margin-bottom: 3px;
      text-align: center;
      line-height: 1;
    }

    .bar-track {
      flex: 1;
      width: 100%;
      background: var(--bg-bar-track);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .bar-fill {
      width: 100%;
      border-radius: 3px;
      transition: height 0.4s ease;
    }

    .legend {
      margin-top: 1rem;
      padding: 8px 12px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-light);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .legend-title { font-weight: 500; color: var(--text-primary); }
    .legend-item { display: flex; align-items: center; gap: 3px; }
    .legend-dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">Projet &laquo;&nbsp;Infrastructure r&#233;seau PME&nbsp;&raquo;</span>
  <span class="header-seance">S&#233;ance 4 / 6</span>
</div>
<p class="header-sub">BTS SIO SISR &mdash; Groupe TP1 &mdash; 27/03/2026</p>

<div class="grid" id="grid"></div>

<div class="legend">
  <span class="legend-title">Crit&#232;res&nbsp;:</span>
  <span class="legend-item">Au = Autonomie</span>
  <span class="legend-item">Ri = Rigueur</span>
  <span class="legend-item">Co = Communication</span>
  <span class="legend-item">En = Engagement</span>
  <span style="margin-left: 8px;" class="legend-title">Barres&nbsp;:</span>
  <span class="legend-item"><span class="legend-dot" style="background:#E24B4A;"></span>Insuffisant</span>
  <span class="legend-item"><span class="legend-dot" style="background:#EF9F27;"></span>&#192; am&#233;liorer</span>
  <span class="legend-item"><span class="legend-dot" style="background:#BA7517;"></span>Neutre</span>
  <span class="legend-item"><span class="legend-dot" style="background:#639922;"></span>Bien</span>
  <span class="legend-item"><span class="legend-dot" style="background:#1D9E75;"></span>Excellent</span>
</div>

<script>
var students = [
  { name: "Dupont A.", pseudo: null, anon: false, auto: 0.6, rig: 0.4, com: 0.8, eng: 0.5, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "or" },
  { name: "Durand B.", pseudo: null, anon: false, auto: -0.1, rig: 0.2, com: 0.1, eng: -0.4, trend: "down",
    pres: { total: 4, present: 2, absent: 2, retards: 0, minRetard: 0 }, rank: "alerte" },
  { name: "Martin C.", pseudo: null, anon: false, auto: 0.4, rig: 0.9, com: 0.3, eng: 0.6, trend: "up",
    pres: { total: 4, present: 3, absent: 0, retards: 1, minRetard: 15 }, rank: "argent" },
  { name: "Bernard L.", pseudo: null, anon: false, auto: 0.0, rig: 0.1, com: -0.2, eng: 0.0, trend: "stable",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "bronze" },
  { name: "Moreau E.", pseudo: "Phoenix", anon: true, auto: -0.5, rig: -0.4, com: -0.7, eng: -0.6, trend: "down",
    pres: { total: 4, present: 1, absent: 2, retards: 1, minRetard: 30 }, rank: "alerte" },
  { name: "Leroy T.", pseudo: null, anon: false, auto: 0.95, rig: 0.75, com: 0.9, eng: 0.95, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "or" },
  { name: "Simon H.", pseudo: null, anon: false, auto: 0.3, rig: 0.5, com: 0.4, eng: 0.3, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "argent" },
  { name: "Laurent L.", pseudo: null, anon: false, auto: -0.2, rig: 0.0, com: 0.1, eng: -0.1, trend: "stable",
    pres: { total: 4, present: 3, absent: 1, retards: 0, minRetard: 0 }, rank: "bronze" },
  { name: "Lefebvre N.", pseudo: null, anon: false, auto: 0.7, rig: 0.8, com: 0.5, eng: 0.7, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "or" },
  { name: "Garcia C.", pseudo: "Nebula", anon: true, auto: 0.1, rig: -0.3, com: 0.2, eng: 0.0, trend: "down",
    pres: { total: 4, present: 3, absent: 0, retards: 1, minRetard: 10 }, rank: "bronze" },
  { name: "Roux A.", pseudo: null, anon: false, auto: 0.5, rig: 0.6, com: 0.7, eng: 0.4, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "argent" },
  { name: "Fournier M.", pseudo: null, anon: false, auto: -0.6, rig: -0.3, com: -0.4, eng: -0.5, trend: "down",
    pres: { total: 4, present: 2, absent: 2, retards: 0, minRetard: 0 }, rank: "alerte" },
  { name: "Girard L.", pseudo: null, anon: false, auto: 0.2, rig: 0.3, com: 0.1, eng: 0.2, trend: "stable",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "argent" },
  { name: "Andr&#233; S.", pseudo: null, anon: false, auto: 0.8, rig: 0.4, com: 0.6, eng: 0.9, trend: "up",
    pres: { total: 4, present: 4, absent: 0, retards: 0, minRetard: 0 }, rank: "or" },
  { name: "Mercier J.", pseudo: null, anon: false, auto: 0.0, rig: 0.2, com: -0.1, eng: 0.1, trend: "stable",
    pres: { total: 4, present: 3, absent: 0, retards: 1, minRetard: 5 }, rank: "bronze" },
];

var criteriaKeys = ["auto", "rig", "com", "eng"];
var criteriaLabels = ["Au", "Ri", "Co", "En"];

var rankStyles = {
  or:     { bg: "#FAEEDA", color: "#854F0B", border: "#FAC775", label: "Or" },
  argent: { bg: "#F1EFE8", color: "#5F5E5A", border: "#D3D1C7", label: "Argent" },
  bronze: { bg: "#FAECE7", color: "#993C1D", border: "#F5C4B3", label: "Bronze" },
  alerte: { bg: "#FCEBEB", color: "#A32D2D", border: "#F7C1C1", label: "Alerte" }
};

function scoreToPercent(v) {
  return Math.round(((Math.max(-1, Math.min(1, v)) + 1) / 2) * 100);
}

function barColor(pct) {
  if (pct <= 20) return "#E24B4A";
  if (pct <= 40) return "#EF9F27";
  if (pct <= 60) return "#BA7517";
  if (pct <= 80) return "#639922";
  return "#1D9E75";
}

function trendHTML(t) {
  if (t === "up") return '<span class="trend trend--up">&#9650;</span>';
  if (t === "down") return '<span class="trend trend--down">&#9660;</span>';
  return '<span class="trend trend--stable">&#9679;</span>';
}

function presHTML(p) {
  var taux = Math.round((p.present / p.total) * 100);
  var dotColor, label;
  if (taux === 100) { dotColor = "#1D9E75"; label = "Assidu"; }
  else if (taux >= 75) { dotColor = "#BA7517"; label = taux + "&nbsp;%"; }
  else { dotColor = "#E24B4A"; label = taux + "&nbsp;%"; }

  var html = '<div class="pres-line"><span class="pres-dot" style="background:' + dotColor + ';"></span>' + label + '</div>';

  var details = [];
  if (p.absent > 0) details.push(p.absent + " abs.");
  if (p.retards > 0) details.push(p.retards + " ret.");
  if (details.length > 0) {
    html += '<div class="detail-line">' + details.join(" / ") + '</div>';
  }
  return html;
}

function chartHTML(s) {
  var html = '<div class="chart">';
  for (var i = 0; i < criteriaKeys.length; i++) {
    var v = s[criteriaKeys[i]];
    var pct = scoreToPercent(v);
    var col = barColor(pct);
    html += '<div class="bar-col">' +
      '<div class="bar-label">' + criteriaLabels[i] + '</div>' +
      '<div class="bar-track">' +
        '<div class="bar-fill" style="height:' + pct + '%; background:' + col + ';"></div>' +
      '</div>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

var grid = document.getElementById("grid");

students.forEach(function(s) {
  var displayName = s.anon && s.pseudo ? s.pseudo : s.name;
  var nameClass = "card-name" + (s.anon ? " card-name--anon" : "");
  var r = rankStyles[s.rank];

  var card =
    '<div class="card">' +
      '<div class="card-top">' +
        '<span class="' + nameClass + '">' + displayName + '</span>' +
        trendHTML(s.trend) +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-info">' +
          '<span class="badge" style="background:' + r.bg + '; color:' + r.color + '; border:0.5px solid ' + r.border + ';">' + r.label + '</span>' +
          presHTML(s.pres) +
        '</div>' +
        chartHTML(s) +
      '</div>' +
    '</div>';

  grid.insertAdjacentHTML("beforeend", card);
});
</script>

</body>
</html>
