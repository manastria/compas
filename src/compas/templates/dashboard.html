<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compas — Dashboard collectif</title>

  <!-- Appliquer le thème avant le rendu pour éviter le flash -->
  <script>
  (function () {
    var t = localStorage.getItem("compas-theme") || "auto";
    if (t !== "auto") document.documentElement.setAttribute("data-theme", t);
  })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables : thème clair (défaut) ── */
    :root {
      --bg-page:      #f4f3ef;
      --bg-card:      #ffffff;
      --bg-bar-track: #e8e7e2;
      --text-primary:   #1a1a1a;
      --text-secondary: #6b6b68;
      --text-tertiary:  #9a9a96;
      --border-light: rgba(0, 0, 0, 0.08);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

      --color-red:    #E24B4A;
      --color-orange: #EF9F27;
      --color-amber:  #BA7517;
      --color-green:  #639922;
      --color-teal:   #1D9E75;

      --rank-or-bg:     #FAEEDA; --rank-or-text:     #854F0B; --rank-or-border:     #FAC775;
      --rank-argent-bg: #F1EFE8; --rank-argent-text: #5F5E5A; --rank-argent-border: #D3D1C7;
      --rank-bronze-bg: #FAECE7; --rank-bronze-text: #993C1D; --rank-bronze-border: #F5C4B3;
      --rank-alerte-bg: #FCEBEB; --rank-alerte-text: #A32D2D; --rank-alerte-border: #F7C1C1;
    }

    /* ── Variables : thème sombre ── */
    /* Mode auto : suit la préférence système (sauf si thème clair forcé) */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-page:      #1a1a1a;
        --bg-card:      #242424;
        --bg-bar-track: #333333;
        --text-primary:   #e8e8e4;
        --text-secondary: #a0a09c;
        --text-tertiary:  #606060;
        --border-light: rgba(255, 255, 255, 0.08);

        --rank-or-bg:     #3a2a00; --rank-or-text:     #f5c060; --rank-or-border:     #7a5500;
        --rank-argent-bg: #2c2c2c; --rank-argent-text: #b0b0aa; --rank-argent-border: #484848;
        --rank-bronze-bg: #3a1a0e; --rank-bronze-text: #e8886a; --rank-bronze-border: #6e2e18;
        --rank-alerte-bg: #3a0e0e; --rank-alerte-text: #f08080; --rank-alerte-border: #6e1818;
      }
    }

    /* Mode sombre forcé */
    :root[data-theme="dark"] {
      --bg-page:      #1a1a1a;
      --bg-card:      #242424;
      --bg-bar-track: #333333;
      --text-primary:   #e8e8e4;
      --text-secondary: #a0a09c;
      --text-tertiary:  #606060;
      --border-light: rgba(255, 255, 255, 0.08);

      --rank-or-bg:     #3a2a00; --rank-or-text:     #f5c060; --rank-or-border:     #7a5500;
      --rank-argent-bg: #2c2c2c; --rank-argent-text: #b0b0aa; --rank-argent-border: #484848;
      --rank-bronze-bg: #3a1a0e; --rank-bronze-text: #e8886a; --rank-bronze-border: #6e2e18;
      --rank-alerte-bg: #3a0e0e; --rank-alerte-text: #f08080; --rank-alerte-border: #6e1818;
    }

    /* ── Layout ── */
    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
      padding: 1rem 1.25rem;
      line-height: 1.4;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 8px;
    }

    .header-left { display: flex; align-items: baseline; gap: 10px; flex: 1; min-width: 0; }
    .header-title { font-size: 18px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-seance { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
    .header-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 1rem; }

    /* ── Bouton de thème ── */
    .theme-btn {
      font: 11px var(--font);
      color: var(--text-secondary);
      background: transparent;
      border: 0.5px solid var(--border-light);
      border-radius: 999px;
      padding: 3px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .theme-btn:hover { background: var(--bg-bar-track); color: var(--text-primary); }

    /* ── Grille de cartes ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }
    @media (min-width: 1100px) {
      .grid { grid-template-columns: repeat(5, 1fr); }
    }

    /* ── Carte étudiant ── */
    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 6px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .card-name--anon { font-style: italic; opacity: 0.7; }

    .trend { font-size: 12px; flex-shrink: 0; }
    .trend--up     { color: var(--color-teal); }
    .trend--down   { color: var(--color-red); }
    .trend--stable { color: var(--text-tertiary); }

    .card-body { display: flex; gap: 10px; flex: 1; }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
      display: inline-block;
      width: fit-content;
    }

    .pres-line {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pres-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-line { font-size: 10px; color: var(--text-tertiary); }

    /* ── Histogramme ── */
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      width: 72px;
      height: 70px;
      padding-top: 2px;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
    }

    .bar-label {
      font-size: 8px;
      color: var(--text-tertiary);
      margin-bottom: 3px;
      text-align: center;
      line-height: 1;
    }

    .bar-track {
      flex: 1;
      width: 100%;
      background: var(--bg-bar-track);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .bar-fill {
      width: 100%;
      border-radius: 3px;
      transition: height 0.4s ease;
    }

    /* ── Légende ── */
    .legend {
      margin-top: 1rem;
      padding: 8px 12px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-light);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .legend-title { font-weight: 500; color: var(--text-primary); }
    .legend-item  { display: flex; align-items: center; gap: 3px; }
    .legend-dot   { display: inline-block; width: 9px; height: 9px; border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title" id="header-title"></span>
    <span class="header-seance" id="header-seance"></span>
  </div>
  <button id="theme-btn" class="theme-btn" title="Changer le th&#232;me d&#39;affichage">Auto</button>
</div>
<p class="header-sub" id="header-sub"></p>

<div class="grid" id="grid"></div>

<div class="legend">
  <span class="legend-title">Crit&#232;res&nbsp;:</span>
  <span class="legend-item">Au&nbsp;= Autonomie</span>
  <span class="legend-item">Ri&nbsp;= Rigueur</span>
  <span class="legend-item">Co&nbsp;= Communication</span>
  <span class="legend-item">En&nbsp;= Engagement</span>
  <span style="margin-left:8px" class="legend-title">Barres&nbsp;:</span>
  <span class="legend-item"><span class="legend-dot" style="background:#E24B4A"></span>Insuffisant</span>
  <span class="legend-item"><span class="legend-dot" style="background:#EF9F27"></span>&#192;&nbsp;am&#233;liorer</span>
  <span class="legend-item"><span class="legend-dot" style="background:#BA7517"></span>Neutre</span>
  <span class="legend-item"><span class="legend-dot" style="background:#639922"></span>Bien</span>
  <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>Excellent</span>
</div>

<script>
/* ------------------------------------------------------------------ */
/* Données injectées par Jinja2                                        */
/* ------------------------------------------------------------------ */
var COMPAS_DATA = {{ compas_data_json | safe }};

/* ------------------------------------------------------------------ */
/* Commutateur de thème                                                */
/* ------------------------------------------------------------------ */
(function () {
  var THEMES   = ["auto", "light", "dark"];
  var LABELS   = { auto: "Auto", light: "Clair", dark: "Sombre" };
  var btn = document.getElementById("theme-btn");

  function applyTheme(theme) {
    if (theme === "auto") {
      document.documentElement.removeAttribute("data-theme");
    } else {
      document.documentElement.setAttribute("data-theme", theme);
    }
    btn.textContent = LABELS[theme];
    localStorage.setItem("compas-theme", theme);
  }

  // Initialisation : restaurer la préférence sauvegardée
  applyTheme(localStorage.getItem("compas-theme") || "auto");

  btn.addEventListener("click", function () {
    var current = localStorage.getItem("compas-theme") || "auto";
    var next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
    applyTheme(next);
  });
})();

/* ------------------------------------------------------------------ */
/* En-tête dynamique                                                   */
/* ------------------------------------------------------------------ */
document.getElementById("header-title").textContent =
  "Projet \u00ab\u00a0" + COMPAS_DATA.projet + "\u00a0\u00bb";
document.getElementById("header-seance").textContent =
  "S\u00e9ance " + COMPAS_DATA.seance_actuelle;
document.getElementById("header-sub").textContent =
  "BTS SIO SISR \u2014 Groupe " + COMPAS_DATA.groupe + " \u2014 " + COMPAS_DATA.date;

/* ------------------------------------------------------------------ */
/* Rendu des cartes                                                    */
/* ------------------------------------------------------------------ */
var criteriaKeys   = ["auto", "rig", "com", "eng"];
var criteriaLabels = ["Au", "Ri", "Co", "En"];

var rankStyles = {
  or:     { bg: "var(--rank-or-bg)",     color: "var(--rank-or-text)",     border: "var(--rank-or-border)",     label: "Or" },
  argent: { bg: "var(--rank-argent-bg)", color: "var(--rank-argent-text)", border: "var(--rank-argent-border)", label: "Argent" },
  bronze: { bg: "var(--rank-bronze-bg)", color: "var(--rank-bronze-text)", border: "var(--rank-bronze-border)", label: "Bronze" },
  alerte: { bg: "var(--rank-alerte-bg)", color: "var(--rank-alerte-text)", border: "var(--rank-alerte-border)", label: "Alerte" }
};

function scoreToPercent(v) {
  if (v === null || v === undefined) return null;
  return Math.round(((Math.max(-1, Math.min(1, v)) + 1) / 2) * 100);
}

function barColor(pct) {
  if (pct <= 20) return "#E24B4A";
  if (pct <= 40) return "#EF9F27";
  if (pct <= 60) return "#BA7517";
  if (pct <= 80) return "#639922";
  return "#1D9E75";
}

function trendHTML(t) {
  if (t === "up")   return '<span class="trend trend--up">&#9650;</span>';
  if (t === "down") return '<span class="trend trend--down">&#9660;</span>';
  return '<span class="trend trend--stable">&#9679;</span>';
}

function presHTML(p) {
  if (!p || p.total === 0) {
    return '<div class="pres-line"><span class="pres-dot" style="background:var(--text-tertiary)"></span>\u2014</div>';
  }
  var taux = Math.round((p.present / p.total) * 100);
  var dotColor;
  if (taux === 100)    dotColor = "#1D9E75";
  else if (taux >= 75) dotColor = "#BA7517";
  else                 dotColor = "#E24B4A";

  var label = taux === 100 ? "Assidu" : taux + "\u00a0%";
  var html = '<div class="pres-line"><span class="pres-dot" style="background:' + dotColor + '"></span>' + label + '</div>';

  var details = [];
  if (p.absent  > 0) details.push(p.absent  + " abs.");
  if (p.retards > 0) details.push(p.retards + " ret.");
  if (details.length) html += '<div class="detail-line">' + details.join(" / ") + '</div>';
  return html;
}

function chartHTML(s) {
  var html = '<div class="chart">';
  for (var i = 0; i < criteriaKeys.length; i++) {
    var v   = s.scores[criteriaKeys[i]];
    var pct = scoreToPercent(v);
    var fillStyle = pct === null
      ? 'height:5%; background:var(--bg-bar-track)'
      : 'height:' + pct + '%; background:' + barColor(pct);
    html +=
      '<div class="bar-col">' +
        '<div class="bar-label">' + criteriaLabels[i] + '</div>' +
        '<div class="bar-track">' +
          '<div class="bar-fill" style="' + fillStyle + '"></div>' +
        '</div>' +
      '</div>';
  }
  return html + '</div>';
}

var grid = document.getElementById("grid");

COMPAS_DATA.students.forEach(function (s) {
  var displayName = s.anon && s.display_name ? s.display_name : s.name;
  var nameClass   = "card-name" + (s.anon ? " card-name--anon" : "");
  var r = rankStyles[s.rank] || rankStyles.alerte;

  var card =
    '<div class="card">' +
      '<div class="card-top">' +
        '<span class="' + nameClass + '">' + displayName + '</span>' +
        trendHTML(s.trend) +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-info">' +
          '<span class="badge" style="background:' + r.bg + ';color:' + r.color + ';border:0.5px solid ' + r.border + '">' + r.label + '</span>' +
          presHTML(s.presence) +
        '</div>' +
        chartHTML(s) +
      '</div>' +
    '</div>';

  grid.insertAdjacentHTML("beforeend", card);
});
</script>

</body>
</html>
